[NEAT]
fitness_criterion = max
fitness_threshold = 100000.0
pop_size = 180
reset_on_extinction = True
no_fitness_termination = False

[DefaultGenome]
num_inputs = 12
num_outputs = 6
num_hidden = 4
feed_forward = True

# full_direct создаёт связи через hidden + прямые input -> output.
# Warning про full исчезнет.
initial_connection = full_direct

activation_default = tanh
activation_mutate_rate = 0.08
activation_options = tanh sigmoid relu identity clamped

aggregation_default = sum
aggregation_mutate_rate = 0.0
aggregation_options = sum

bias_init_mean = 0.0
bias_init_stdev = 0.7
bias_init_type = gaussian
bias_max_value = 30.0
bias_min_value = -30.0
bias_mutate_power = 0.45
bias_mutate_rate = 0.35
bias_replace_rate = 0.08

weight_init_mean = 0.0
weight_init_stdev = 1.2
weight_init_type = gaussian
weight_max_value = 30
weight_min_value = -30
weight_mutate_power = 0.55
weight_mutate_rate = 0.55
weight_replace_rate = 0.08

response_init_mean = 1.0
response_init_stdev = 0.0
response_init_type = gaussian
response_max_value = 30.0
response_min_value = -30.0
response_mutate_power = 0.0
response_mutate_rate = 0.0
response_replace_rate = 0.0

conn_add_prob = 0.25
conn_delete_prob = 0.015
node_add_prob = 0.05
node_delete_prob = 0.005

enabled_default = True
enabled_mutate_rate = 0.025

single_structural_mutation = False
structural_mutation_surer = default

compatibility_disjoint_coefficient = 0.7
compatibility_weight_coefficient = 0.35

[DefaultSpeciesSet]
# 3.0 даст больше разнообразия, чем 7.5.
# С min_species_size = 1 и elitism = 1 старый crash не должен вернуться.
compatibility_threshold = 3.0

[DefaultStagnation]
species_fitness_func = max
max_stagnation = 18
species_elitism = 1

[DefaultReproduction]
elitism = 1
survival_threshold = 0.25
min_species_size = 1